name: Hygiene

# Fails if local-only or sensitive files are ever tracked in git.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  forbidden-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure local-only and secret files are not tracked
        run: |
          if git ls-files | grep -E '(^|/)\.env$|(^|/)\.env\.[^e]|\.pem$|(^|/)node_modules/|(^|/)\.DS_Store$'; then
            echo "::error::A local-only or secret file is tracked. Remove it from version control."
            exit 1
          fi
          echo "No local-only or secret files tracked."
