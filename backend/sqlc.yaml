version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "sql/queries"
    gen:
      go:
        package: "sqlc"
        out: "internal/platform/db/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: false
        emit_pointers_for_null_types: true
        emit_exact_table_names: false
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "citext"
            go_type: "string"
